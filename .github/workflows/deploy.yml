name: CI/CD Pipeline

# This triggers the pipeline every time you push to the 'main' branch
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # These permissions are required to upload to GitHub Container Registry (GHCR)
    permissions:
      contents: read
      packages: write
      
    steps:
      # 1. Grabs your code
      - name: Checkout Code
        uses: actions/checkout@v3
      
      # 2. Sets up Node.js for the React build
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      # 3. Installs dependencies and builds the React app
      - name: Install dependencies and Build
        run: |
          npm ci
          npm run build

      # 4. Logs into GitHub's built-in Docker Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub provides this token automatically!

      # 5. Builds the Docker image and pushes it to your repository packages
      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}